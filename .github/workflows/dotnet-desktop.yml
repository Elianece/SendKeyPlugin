name: Build Plugin

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Build
        run: msbuild SendKeyPlugin.csproj /p:Configuration=Release /p:Platform=AnyCPU

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: SendKeyPlugin
          path: bin/Release/SendKeyPlugin.dll

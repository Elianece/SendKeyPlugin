name: Build Plugin

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore SendKeyPlugin.csproj

      - name: Build
        run: dotnet build SendKeyPlugin.csproj -c Release

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: SendKeyPlugin
          path: bin/Release/net48/SendKeyPlugin.dll
